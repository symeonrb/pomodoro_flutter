publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  async: ^2.11.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
